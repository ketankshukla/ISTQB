<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ISTQB Study Hub — All Courses</title>
  <link rel="stylesheet" href="assets/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <button id="menuToggle" class="menu-toggle" aria-label="Toggle menu">☰</button>
      <span class="logo">📚</span>
      <h1>ISTQB Study Hub</h1>
      <span id="crumb" class="crumb">All Courses</span>
    </header>

    <aside id="sidebar" class="sidebar">
      <div class="search-wrap">
        <input id="searchBox" type="search" placeholder="🔎 Search all courses…" autocomplete="off" />
      </div>
      <nav id="nav"></nav>
      <div id="results" style="display:none"></div>
    </aside>

    <main class="content-wrap">
      <article id="content" class="content"></article>
    </main>
  </div>

  <script src="assets/app.js"></script>
</body>
</html>
